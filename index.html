<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>青埔國中 114 學年度七年級第一次段考 - 即時儀表板</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=Noto+Sans+TC:wght@100..900&display=swap');
        
        body {
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background-color: #a4c9e4;
            overflow: hidden; /* 預設禁止滾動 */
        }

        /* --- 終極置中遮罩層 --- */
        #fullscreen-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #020617; /* 底部背景 */
            display: flex;         /* 使用 Flex */
            justify-content: center; /* 水平置中 */
            align-items: center;     /* 垂直置中 */
            z-index: 99999;
            cursor: pointer;
        }

        /* 1920x1080 內容區域 */
        #overlay-content-area {
            width: 1920px;
            height: 1080px;
            background-color: #020617; /* 內容背景 */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white; /* 確保文字是白色 */
            
            /* 關鍵：如果螢幕太小，縮放而不跑版 */
            max-width: 100%;
            max-height: 100%;
            box-sizing: border-box;
        }

        /* 文字樣式：強制白色並加大 */
        #overlay-text {
            color: #ffffff !important;
            font-size: 5rem;
            font-weight: 900;
            text-align: center;
            line-height: 1.2;
            margin-bottom: 3rem;
        }

        .dashboard-container { max-width: 1100px; margin: 2rem auto; width: 93%; }
        .card { background-color: white; border-radius: 1.5rem; padding: 1.5rem; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .exam-table th, .exam-table td { padding: 16px; text-align: center; border-bottom: 1px solid #eee; }
    </style>
</head>
<body id="body-tag">

    <div id="fullscreen-overlay" onclick="requestFullScreen()">
        <div id="overlay-content-area">
            <h2 id="overlay-text">請點擊畫面進入全螢幕模式</h2>
            <button id="overlay-confirm-btn" onclick="hideOverlay(event)" 
                    class="hidden px-20 py-8 bg-blue-600 text-white rounded-full font-black text-4xl hover:bg-blue-700 shadow-2xl transition-transform active:scale-95">
                確 定
            </button>
        </div>
    </div>

    <div class="dashboard-container">
        <header class="text-center mb-6">
            <h1 class="text-3xl font-extrabold text-blue-900">青埔國中 114 學年度七年級第一次段考</h1>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
            <div class="card flex flex-col items-center justify-center text-center">
                <h2 class="text-xl font-bold text-gray-800 mb-2">⏱️ 當前日期與時間</h2>
                <div id="current-date" class="text-2xl font-semibold text-gray-700 mb-2"></div>
                <div id="current-time" class="text-6xl font-extrabold text-blue-600"></div>
            </div>

            <div class="card">
                <h2 class="text-xl font-bold text-gray-800 mb-4 text-center">👥 考場人數統計</h2>
                <div class="grid grid-cols-3 gap-4 text-center">
                    <div><p class="text-gray-500 font-bold mb-1">應到</p><input type="number" id="total-students" value="30" oninput="updateAttendance()" class="w-full text-3xl font-black text-center border-b-2 outline-none"></div>
                    <div><p class="text-gray-500 font-bold mb-1">實到</p><input type="number" id="present-students" value="30" oninput="updateAttendance()" class="w-full text-3xl font-black text-center text-green-600 border-b-2 outline-none"></div>
                    <div><p class="text-gray-500 font-bold mb-1">缺席</p><div id="absent-students" class="text-3xl font-black text-red-600">0</div></div>
                </div>
            </div>
        </div>

        <div class="card mb-6 text-center p-8">
            <p class="text-xl font-semibold text-gray-500 mb-2">📝 現在科目與活動狀態</p>
            <div id="current-subject-output" class="text-4xl font-bold">載入中...</div>
        </div>

        <div class="card">
            <div class="flex justify-center space-x-4 mb-6">
                <button id="btn-day1" onclick="switchDay('Day1')" class="px-8 py-3 rounded-full font-bold bg-blue-600 text-white">04/01（三）</button>
                <button id="btn-day2" onclick="switchDay('Day2')" class="px-8 py-3 rounded-full font-bold bg-gray-200 text-gray-700">04/02（四）</button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead class="bg-gray-50">
                        <tr><th class="w-1/4">節次</th><th class="w-1/3">時間</th><th id="exam-day-header">科目</th></tr>
                    </thead>
                    <tbody id="schedule-table-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        function requestFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(() => {});
            }
        }

        document.addEventListener('fullscreenchange', () => {
            const overlay = document.getElementById('fullscreen-overlay');
            const text = document.getElementById('overlay-text');
            const btn = document.getElementById('overlay-confirm-btn');

            if (document.fullscreenElement) {
                text.innerHTML = "已進入全螢幕模式<br><span style='font-size:2rem; color:#94a3b8;'>按 ESC 鍵可退出並鎖定</span>";
                btn.classList.remove('hidden');
                overlay.style.cursor = "default";
            } else {
                window.location.reload();
            }
        });

        function hideOverlay(e) {
            e.stopPropagation();
            document.getElementById('fullscreen-overlay').style.display = 'none';
            document.getElementById('body-tag').style.overflow = 'auto';
        }

        // 人數計算
        function updateAttendance() {
            const total = parseInt(document.getElementById('total-students').value) || 0;
            const present = parseInt(document.getElementById('present-students').value) || 0;
            document.getElementById('absent-students').textContent = Math.max(0, total - present);
        }

        // 時間與考程 (簡化版邏輯)
        function updateClock() {
            const now = new Date();
            document.getElementById('current-date').textContent = now.toLocaleDateString('zh-TW', { year:'numeric', month:'2-digit', day:'2-digit', weekday:'long' });
            document.getElementById('current-time').textContent = now.toLocaleTimeString('zh-TW', { hour12: false });
        }

        // 初始執行
        setInterval(updateClock, 1000);
        updateClock();
        updateAttendance();

        // 科目切換 (Demo 用)
        function switchDay(day) {
            const isDay1 = day === 'Day1';
            document.getElementById('btn-day1').className = isDay1 ? 'px-8 py-3 rounded-full font-bold bg-blue-600 text-white' : 'px-8 py-3 rounded-full font-bold bg-gray-200 text-gray-700';
            document.getElementById('btn-day2').className = !isDay1 ? 'px-8 py-3 rounded-full font-bold bg-blue-600 text-white' : 'px-8 py-3 rounded-full font-bold bg-gray-200 text-gray-700';
            document.getElementById('exam-day-header').textContent = isDay1 ? '04/01 科目' : '04/02 科目';
        }
    </script>
</body>
</html>
