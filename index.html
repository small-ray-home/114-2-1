<!DOCTYPE html>
<html lang="zh-TW" style="overflow: hidden;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>青埔國中 段考即時儀表板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@900&family=Noto+Sans+TC:wght@900&display=swap');
        
        body {
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            margin: 0; padding: 0; height: 100vh; width: 100vw;
            background-color: #a4c9e4;
            overflow: hidden !important;
            display: flex; justify-content: center; align-items: center;
        }

        #fullscreen-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #020617; display: flex; justify-content: center; align-items: center; z-index: 99999;
        }

        .main-container {
            width: 100%;
            max-width: 1750px;
            height: 94vh;
            display: grid;
            grid-template-columns: 1fr 1.4fr;
            gap: 2.5rem;
            padding: 0 2.5rem;
            box-sizing: border-box;
        }

        .card { 
            background-color: white; 
            border-radius: 2.5rem; 
            padding: 2.5rem; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            height: 100%;
        }
        
        #current-time {
            font-family: 'Inter', monospace;
            font-variant-numeric: tabular-nums;
        }

        .exam-table { width: 100%; border-collapse: separate; border-spacing: 0; }
        .exam-table th { font-size: 2.2rem; padding: 1.2rem; background: #f8fafc; border-bottom: 4px solid #e2e8f0; }
        .exam-table td { font-size: 2rem; padding: 1.2rem; border-bottom: 2px solid #f1f5f9; text-align: center; }
        
        input { border-bottom: 4px solid #f1f5f9; outline: none; transition: 0.3s; background: transparent; }
        input:focus { border-color: #3b82f6; }
        
        .highlight-row { background-color: #fef9c3 !important; outline: 5px solid #facc15; }
        
        .day-btn {
            flex: 1; padding: 1.2rem; border-radius: 1.5rem;
            font-size: 2rem; font-weight: 900; transition: all 0.3s ease;
        }

        .status-content-wrapper {
            display: flex;
            flex-direction: column;
            height: 100%;
        }
    </style>
</head>
<body>

    <div id="fullscreen-overlay" onclick="requestFullScreen()">
        <div class="text-center text-white">
            <h2 class="text-7xl font-black mb-10">點擊進入全螢幕 使用esc退出</h2>
            <button id="overlay-confirm-btn" onclick="hideOverlay(event)" 
                    class="hidden px-20 py-8 bg-blue-600 rounded-full text-4xl font-black">確 定</button>
        </div>
    </div>

    <div class="main-container">
        <div class="flex flex-col gap-8 h-full">
            <div class="card flex flex-col justify-center items-center text-center shrink-0" style="height: 35%;">
                <h1 class="text-4xl font-black text-blue-900 mb-2">114學年度 第一次段考</h1>
                <div id="current-date" class="text-3xl font-bold text-gray-500 mb-1"></div>
                <div id="current-time" class="text-[8rem] font-black text-blue-600 tracking-tighter"></div>
            </div>

            <div class="card flex-1">
                <div class="status-content-wrapper">
                    <div id="section-attendance" class="flex flex-col justify-center border-b-2 border-gray-50 transition-all duration-500">
                        <div class="grid grid-cols-3 gap-6 text-center">
                            <div>
                                <p class="text-2xl font-bold text-gray-400 mb-1">應到</p>
                                <input type="number" id="total-students" value="30" oninput="updateAttendance()" class="w-full text-7xl font-black text-center">
                            </div>
                            <div>
                                <p class="text-2xl font-bold text-gray-400 mb-1">實到</p>
                                <input type="number" id="present-students" value="30" oninput="updateAttendance()" class="w-full text-7xl font-black text-center text-green-600">
                            </div>
                            <div>
                                <p class="text-2xl font-bold text-gray-400 mb-1">缺席</p>
                                <div id="absent-students" class="text-7xl font-black text-red-600">0</div>
                            </div>
                        </div>
                    </div>

                    <div id="absent-info-section" class="hidden flex-col justify-center bg-red-50 rounded-3xl px-8 my-2 transition-all duration-500 overflow-hidden">
                        <div class="grid grid-cols-2 gap-12">
                            <div class="flex flex-col gap-2">
                                <span class="text-3xl font-black text-red-600">病假座號：</span>
                                <input type="text" placeholder="例：5, 12" class="w-full text-4xl font-bold p-2 border-red-200">
                            </div>
                            <div class="flex flex-col gap-2">
                                <span class="text-3xl font-black text-blue-600">事假座號：</span>
                                <input type="text" placeholder="例：3, 21" class="w-full text-4xl font-bold p-2 border-blue-200">
                            </div>
                        </div>
                    </div>

                    <div id="section-status" class="flex flex-col justify-center text-center transition-all duration-500">
                        <p class="text-2xl font-bold text-gray-400">當前狀態</p>
                        <div id="current-subject-output" class="text-7xl font-black text-gray-800 mt-2"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card flex flex-col">
            <div class="flex gap-6 mb-8 shrink-0">
                <button id="btn-day1" onclick="switchDay('Day1')" class="day-btn">第一天 (4/1)</button>
                <button id="btn-day2" onclick="switchDay('Day2')" class="day-btn">第二天 (4/2)</button>
            </div>
            <div class="flex-1 overflow-hidden">
                <table class="exam-table">
                    <thead>
                        <tr>
                            <th class="w-1/4">節次</th>
                            <th class="w-2/5">時間</th>
                            <th id="exam-day-header">科目</th>
                        </tr>
                    </thead>
                    <tbody id="schedule-table-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        function requestFullScreen() { document.documentElement.requestFullscreen().catch(() => {}); }
        document.addEventListener('fullscreenchange', () => {
            if (document.fullscreenElement) document.getElementById('overlay-confirm-btn').classList.remove('hidden');
            else window.location.reload(); 
        });
        function hideOverlay(event) { event.stopPropagation(); document.getElementById('fullscreen-overlay').style.display = 'none'; }

        const DAY1_DATE_STR = "2026/04/01";
        const DAY2_DATE_STR = "2026/04/02";
        
        // 修改後的資料結構：t1 代表第一天時間，t2 代表第二天時間
        const SCHEDULE_DATA = [
            { s: '第一節', t1: '08:30–09:15', t2: '08:30–09:15', d1: '自習', d2: '自習', isExam: false },
            { s: '第二節', t1: '09:25–10:10', t2: '09:25–10:10', d1: '國文(01)', d2: '英文(02)', isExam: true },
            { s: '第三節', t1: '10:20–11:05', t2: '10:20–11:05', d1: '自習', d2: '自習', isExam: false },
            { s: '第四節', t1: '11:15–12:00', t2: '11:15–12:00', d1: '生物(25)', d2: '數學(03)', isExam: true },
            { s: '午休',   t1: '12:00–13:15', t2: '12:00–13:15', d1: '午餐午休', d2: '午餐午休', isExam: false },
            { s: '第五節', t1: '13:15–13:55', t2: '13:15–14:00', d1: '自習', d2: '班際競賽', isExam: false },
            { s: '第六節', t1: '14:05–14:55', t2: '14:10–14:55', d1: '寫作測驗', d2: '班際競賽', isExam: true },
            { s: '第七節', t1: '15:05–15:50', t2: '15:05–15:50', d1: '社會(27)', d2: '班際競賽', isExam: true }
        ];

        let currentView = 'Day1';

        function switchDay(day) {
            currentView = day;
            const isD1 = day === 'Day1';
            document.getElementById('btn-day1').className = isD1 ? 'day-btn bg-blue-600 text-white shadow-xl' : 'day-btn bg-gray-100 text-gray-400 hover:bg-gray-200';
            document.getElementById('btn-day2').className = !isD1 ? 'day-btn bg-blue-600 text-white shadow-xl' : 'day-btn bg-gray-100 text-gray-400 hover:bg-gray-200';
            renderTable();
        }

        function getTimeInMinutes(timeStr) {
            const [h, m] = timeStr.split(':').map(Number);
            return h * 60 + m;
        }

        function renderTable() {
            const body = document.getElementById('schedule-table-body');
            body.innerHTML = '';
            const now = new Date();
            const todayStr = now.toLocaleDateString('zh-TW', {year:'numeric', month:'2-digit', day:'2-digit'}).replace(/\//g, '/');
            const nowMin = now.getHours() * 60 + now.getMinutes();

            SCHEDULE_DATA.forEach(item => {
                const row = document.createElement('tr');
                const timeRange = currentView === 'Day1' ? item.t1 : item.t2;
                const [startStr, endStr] = timeRange.split('–');
                
                const startMin = getTimeInMinutes(startStr);
                const endMin = getTimeInMinutes(endStr);

                const isToday = (todayStr === DAY1_DATE_STR && currentView === 'Day1') || (todayStr === DAY2_DATE_STR && currentView === 'Day2');
                if (isToday && (nowMin >= startMin && nowMin < endMin)) {
                    row.className = 'highlight-row';
                }

                const subject = currentView === 'Day1' ? item.d1 : item.d2;
                const isExamSub = item.isExam && !subject.includes('競賽') && !subject.includes('自習');
                
                row.innerHTML = `
                    <td>${item.s}</td>
                    <td class="font-mono font-bold">${timeRange}</td>
                    <td class="${isExamSub ? 'text-red-600' : 'text-gray-700'} font-black">${subject}</td>
                `;
                body.appendChild(row);
            });
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('current-date').textContent = now.toLocaleDateString('zh-TW', { month: '2-digit', day: '2-digit', weekday: 'long' });
            document.getElementById('current-time').textContent = now.toLocaleTimeString('zh-TW', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
            
            const todayStr = now.toLocaleDateString('zh-TW', {year:'numeric', month:'2-digit', day:'2-digit'}).replace(/\//g, '/');
            const nowMin = now.getHours() * 60 + now.getMinutes();
            let status = "非考程時間";

            if (todayStr === DAY1_DATE_STR || todayStr === DAY2_DATE_STR) {
                SCHEDULE_DATA.forEach(item => {
                    const timeRange = (todayStr === DAY1_DATE_STR) ? item.t1 : item.t2;
                    const [startStr, endStr] = timeRange.split('–');
                    if (nowMin >= getTimeInMinutes(startStr) && nowMin < getTimeInMinutes(endStr)) {
                        status = (todayStr === DAY1_DATE_STR) ? item.d1 : item.d2;
                    }
                });
            }
            document.getElementById('current-subject-output').textContent = status;
            
            // 每分鐘重新渲染表格以更新高亮（或是直接在 updateClock 裡做）
            if (now.getSeconds() === 0) renderTable();
        }

        function updateAttendance() {
            const total = parseInt(document.getElementById('total-students').value) || 0;
            const present = parseInt(document.getElementById('present-students').value) || 0;
            const absent = Math.max(0, total - present);
            document.getElementById('absent-students').textContent = absent;

            const infoSec = document.getElementById('absent-info-section');
            const attenSec = document.getElementById('section-attendance');
            const statusSec = document.getElementById('section-status');

            if (absent > 0) {
                infoSec.style.display = 'flex';
                attenSec.style.height = '33%';
                infoSec.style.height = '33%';
                statusSec.style.height = '34%';
            } else {
                infoSec.style.display = 'none';
                attenSec.style.height = '50%';
                statusSec.style.height = '50%';
            }
        }

        window.onload = () => {
            const todayStr = new Date().toLocaleDateString('zh-TW', {year:'numeric', month:'2-digit', day:'2-digit'}).replace(/\//g, '/');
            switchDay(todayStr === DAY2_DATE_STR ? 'Day2' : 'Day1');
            setInterval(updateClock, 1000);
            updateClock(); 
            updateAttendance();
        };
    </script>
</body>
</html>
